<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI LaserShow Client</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── HARDWARE SETUP MODAL (shown on first launch) ── -->
  <div id="setup-overlay" class="overlay">
    <div class="setup-card">
      <div class="setup-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="#6c63ff" stroke-width="2"/>
          <path d="M24 8 L24 24 L36 32" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="24" cy="24" r="4" fill="#6c63ff"/>
          <path d="M8 24 L16 24" stroke="#ff6584" stroke-width="2" stroke-linecap="round"/>
          <path d="M32 24 L40 24" stroke="#43d9a3" stroke-width="2" stroke-linecap="round"/>
          <path d="M14 14 L20 20" stroke="#ffcd56" stroke-width="2" stroke-linecap="round"/>
          <path d="M28 28 L34 34" stroke="#ff6584" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h1>AI LaserShow Client</h1>
        <p class="tagline">Configure your hardware to begin</p>
      </div>

      <div class="setup-fields">
        <label>
          <span>Laser Brand / Model</span>
          <select id="laser-brand">
            <option value="EytseEY003L">Eytse EY003-L (16-Channel Mode)</option>
            <option value="Generic7Channel">Generic DJ Animation Laser (7-Channel Mode)</option>
            <option value="Custom">Custom Laser Array (User-Mapped Matrix)</option>
          </select>
        </label>

        <label>
          <span>Serial COM Port</span>
          <div class="port-row">
            <select id="com-port">
              <option value="">Scanning ports…</option>
            </select>
            <button id="refresh-ports" class="icon-btn" title="Rescan ports">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 4v6h6M23 20v-6h-6"/>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
              </svg>
            </button>
          </div>
        </label>

        <!-- Custom channel mapping (only visible when Custom is selected) -->
        <div id="custom-grid" class="custom-grid hidden">
          <p class="grid-label">Custom Channel Mapping</p>
          <div class="channel-map-grid" id="channel-map-grid"></div>
        </div>

        <div id="connect-error" class="error-msg hidden"></div>

        <button id="btn-connect" class="btn-primary" disabled>
          Connect &amp; Launch
        </button>
      </div>
    </div>
  </div>

  <!-- ── MAIN APPLICATION ── -->
  <div id="app" class="app hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="#6c63ff" stroke-width="2"/>
          <circle cx="24" cy="24" r="4" fill="#6c63ff"/>
          <path d="M8 24 L16 24" stroke="#ff6584" stroke-width="2" stroke-linecap="round"/>
          <path d="M32 24 L40 24" stroke="#43d9a3" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>LaserShow</span>
      </div>

      <nav>
        <button class="nav-item active" data-panel="show">Show</button>
        <button class="nav-item" data-panel="channels">Channels</button>
        <button class="nav-item" data-panel="settings">Settings</button>
      </nav>

      <div class="hw-status">
        <span id="hw-dot" class="dot connected"></span>
        <span id="hw-label">DMX Connected</span>
      </div>

      <div class="hw-info">
        <small id="hw-brand-label">—</small>
        <small id="hw-port-label">—</small>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-area">

      <!-- SHOW PANEL -->
      <section id="panel-show" class="panel active">

        <!-- Drop zone -->
        <div id="drop-zone" class="drop-zone">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77A5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
          <p>Drop an audio file here</p>
          <span>.mp3 · .wav · .ogg</span>
          <button id="btn-browse" class="btn-ghost">Browse file…</button>
        </div>

        <!-- Track info (hidden until loaded) -->
        <div id="track-info" class="track-info hidden">
          <div class="track-meta">
            <div class="track-name-row">
              <span id="track-name">—</span>
              <span id="track-bpm" class="badge">— BPM</span>
              <span id="track-duration" class="badge">—:——</span>
            </div>
          </div>

          <!-- Playback controls -->
          <div class="transport">
            <button id="btn-play" class="btn-play">
              <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M5 3l14 9-14 9V3z"/>
              </svg>
              <svg id="icon-stop" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="hidden">
                <rect x="4" y="4" width="16" height="16" rx="2"/>
              </svg>
            </button>
            <div class="progress-bar-wrap">
              <div id="progress-bar" class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
              </div>
              <div class="time-labels">
                <span id="time-current">0:00</span>
                <span id="time-total">0:00</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Spectrum visualiser -->
        <div class="visualiser-wrap">
          <canvas id="spectrum-canvas" class="spectrum-canvas"></canvas>
          <div class="envelope-bars">
            <div class="env-bar">
              <div class="env-fill" id="bar-bass"></div>
              <span>BASS</span>
            </div>
            <div class="env-bar">
              <div class="env-fill" id="bar-mid"></div>
              <span>MID</span>
            </div>
            <div class="env-bar">
              <div class="env-fill" id="bar-high"></div>
              <span>HIGH</span>
            </div>
          </div>
        </div>

      </section>

      <!-- CHANNELS PANEL -->
      <section id="panel-channels" class="panel">
        <h2>Live DMX Channel Values</h2>
        <p class="sub">Real-time output during playback</p>
        <div id="channel-grid" class="channel-display-grid"></div>
      </section>

      <!-- SETTINGS PANEL -->
      <section id="panel-settings" class="panel">
        <h2>Hardware Settings</h2>
        <div class="settings-group">
          <label>
            <span>Laser Profile</span>
            <select id="settings-profile">
              <option value="EytseEY003L">Eytse EY003-L (16-Channel)</option>
              <option value="Generic7Channel">Generic 7-Channel</option>
              <option value="Custom">Custom</option>
            </select>
          </label>
          <label>
            <span>COM Port</span>
            <div class="port-row">
              <select id="settings-port"></select>
              <button id="settings-refresh-ports" class="icon-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 4v6h6M23 20v-6h-6"/>
                  <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                </svg>
              </button>
            </div>
          </label>
          <button id="btn-reconnect" class="btn-primary">Reconnect</button>
          <button id="btn-disconnect" class="btn-ghost btn-danger">Disconnect</button>
        </div>
      </section>

    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
